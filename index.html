<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Catálogo de albuns</title> <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Catálogo de albuns</h1>
        <p>Minha seleção pessoal de álbuns favoritos</p>
    </header>

    <main class="gallery-container">
        
        <article class="album-card">
            <div class="image-wrapper">
                <img src="caos.jpg" alt="Capa do Álbum CAOS">
            </div>
            <div class="album-info">
                <h2>CAOS</h2>
                <h3>Alee</h3>
                <span class="year">2023</span>
            </div>
        </article>

        <article class="album-card">
            <div class="image-wrapper">
                <img src="nothing-but-thieves.jpg" alt="Capa do Álbum Nothing But Thieves">
            </div>
            <div class="album-info">
                <h2>Nothing But Thieves</h2>
                <h3>Nothing But Thieves</h3>
                <span class="year">2015</span>
            </div>
        </article>

        <article class="album-card">
            <div class="image-wrapper">
                <img src="camisa-10.jpg" alt="Capa do Álbum Camisa 10">
            </div>
            <div class="album-info">
                <h2>Camisa 10 Joga Bola Até na Chuva</h2>
                <h3>Charlie Brown Jr.</h3>
                <span class="year">2009</span>
            </div>
        </article>

    </main>

    <footer>
        <p>&copy; 2026 Catálogo de albuns. Criado com HTML e CSS.</p>
    </footer>

    <script src="script.js"></script>
    
</body>
</html>
