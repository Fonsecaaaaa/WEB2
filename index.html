<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Catálogo de Álbuns</title> 
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Catálogo de Álbuns</h1>
        <p>Minha seleção pessoal de álbuns favoritos</p>
    </header>

    <!-- NOVA SEÇÃO: Formulário para adicionar álbuns -->
    <section class="form-container">
        <h2>Adicionar Novo Álbum</h2>
        <form id="form">
            <div class="input-group">
                <input type="text" id="titulo" placeholder="Título do Álbum" required>
                <input type="text" id="artista" placeholder="Nome do Artista" required>
            </div>
            <div class="input-group">
                <input type="url" id="imagem" placeholder="URL da Capa (Ex: https://...)" required>
                <input type="number" id="ano" placeholder="Ano de Lançamento" required>
            </div>
            <button type="submit">Adicionar à Galeria</button>
        </form>
    </section>

    <main class="gallery-container">
        
        <article class="album-card">
            <div class="image-wrapper">
                <img src="caos.jpg" alt="Capa do Álbum CAOS">
            </div>
            <div class="album-info">
                <h2>CAOS</h2>
                <h3>Alee</h3>
                <span class="year">2023</span>
            </div>
        </article>

        <article class="album-card">
            <div class="image-wrapper">
                <img src="nothing-but-thieves.jpg" alt="Capa do Álbum Nothing But Thieves">
            </div>
            <div class="album-info">
                <h2>Nothing But Thieves</h2>
                <h3>Nothing But Thieves</h3>
                <span class="year">2015</span>
            </div>
        </article>

        <article class="album-card">
            <div class="image-wrapper">
                <img src="camisa-10.jpg" alt="Capa do Álbum Camisa 10">
            </div>
            <div class="album-info">
                <h2>Camisa 10 Joga Bola Até na Chuva</h2>
                <h3>Charlie Brown Jr.</h3>
                <span class="year">2009</span>
            </div>
        </article>

    </main>

    <footer>
        <p>&copy; 2026 Catálogo de Álbuns. Criado com HTML, CSS e JS.</p>
    </footer>

    <script src="script.js"></script>
    
</body>
</html>
